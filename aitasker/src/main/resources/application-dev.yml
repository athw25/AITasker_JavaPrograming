spring:
  datasource:
    url: jdbc:sqlserver://${DB_HOST:127.0.0.1}:${DB_PORT:1433};databaseName=${DB_NAME:AITasker};encrypt=false;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:Aa123456}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

app:
  jwt:
    secret: ${JWT_SECRET:aitasker-jwt-secret-key-must-be-at-least-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:gemini}
  gemini:
    api-key: ${AI_GEMINI_API_KEY:}
    model: ${AI_GEMINI_MODEL:gemini-2.0-flash}
    base-url: https://generativelanguage.googleapis.com/v1beta/models
    timeout-seconds: 30
    temperature: 0.7
    max-output-tokens: 2048

file:
  upload:
    dir: ${FILE_UPLOAD_DIR:uploads}

logging:
  level:
    com.aitasker: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
