spring:
  application:
    name: aitasker

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=AITasker;encrypt=false;trustServerCertificate=true
    username: sa
    password: Aa123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "aitasker-jwt-secret-key-must-be-at-least-32-characters"
    expiration-ms: 86400000