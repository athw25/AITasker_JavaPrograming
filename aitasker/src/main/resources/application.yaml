spring:
  application:
    name: aitasker

  datasource:
    url: ${DB_URL:jdbc:sqlserver://127.0.0.1:1433;databaseName=AITasker;encrypt=false;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:Aa123456}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_SECRET:aitasker-jwt-secret-key-must-be-at-least-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
  mail:
    enabled: ${MAIL_ENABLED:false}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  admin:
    email: ${ADMIN_EMAIL:admin@aitasker.com}
    password: ${ADMIN_PASSWORD:Admin@123}
  seed:
    demo-data: ${SEED_DEMO_DATA:false}
  ratelimit:
    login:
      max-attempts: ${LOGIN_RATE_LIMIT:5}
      window-ms: ${LOGIN_RATE_WINDOW_MS:60000}
