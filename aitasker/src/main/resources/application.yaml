spring:
  application:
    name: aitasker

  datasource:
    url: jdbc:sqlserver://127.0.0.1:1433;databaseName=AITasker;encrypt=false;trustServerCertificate=true
    username: sa
    password: Aa123456 #tự đổi theo pass SQL Server của mọi người
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com # Thay đổi email của bạn
    password: your-app-password # Thay đổi app password của bạn
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: "aitasker-jwt-secret-key-must-be-at-least-32-characters"
    expiration-ms: 86400000
  
  email:
    from: noreply@aitasker.com
    from-name: AITasker
    support-email: support@aitasker.com
  
  file:
    max-size: 10485760 # 10MB
    allowed-types: pdf,doc,docx,jpg,jpeg,png,gif,xlsx,xls,txt
    upload-dir: /uploads # Thay đổi theo môi trường