spring:
  application:
    name: aitasker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:sqlserver://${DB_HOST:127.0.0.1}:${DB_PORT:1433};databaseName=${DB_NAME:AITasker};encrypt=false;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:gemini}
  gemini:
    api-key: ${AI_GEMINI_API_KEY:}
    model: ${AI_GEMINI_MODEL:gemini-2.0-flash}
    base-url: https://generativelanguage.googleapis.com/v1beta/models
    timeout-seconds: 30
    temperature: 0.7
    max-output-tokens: 2048

file:
  upload:
    dir: ${FILE_UPLOAD_DIR:uploads}