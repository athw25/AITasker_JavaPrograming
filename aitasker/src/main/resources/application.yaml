spring:
  application:
    name: aitasker

  datasource:
  #  Thay đổi cấu hình kết nối theo môi trường của bạn, lưu ý tạo database AITasker trước khi chạy ứng dụng
    url: jdbc:sqlserver://localhost:1433;databaseName=AITasker;encrypt=false;trustServerCertificate=true 
    username: sa
    password: 123456 # Thay đổi mật khẩu này theo cấu hình của bạn
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com # Thay đổi email của bạn
    password: your-app-password # Thay đổi app password của bạn
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: "aitasker-jwt-secret-key-must-be-at-least-32-characters"
    expiration-ms: 86400000
  
  email:
    from: noreply@aitasker.com
    from-name: AITasker
    support-email: support@aitasker.com
  
  file:
    max-size: 10485760 # 10MB
    allowed-types: pdf,doc,docx,jpg,jpeg,png,gif,xlsx,xls,txt
    upload-dir: /uploads # Thay đổi theo môi trường